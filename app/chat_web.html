<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>wGInfer Chat</title>
  <style>
    :root {
      --bg0: #f2efe8;
      --bg1: #e6ebf2;
      --panel: rgba(255, 255, 255, 0.8);
      --ink: #1d2a35;
      --muted: #5c6b79;
      --accent: #0c7a73;
      --accent-2: #f26a4b;
      --border: #ccd4de;
      --assistant: #ffffff;
      --user: #e6f7f5;
      --danger: #9e2a2b;
    }

    * {
      box-sizing: border-box;
    }

    html, body {
      width: 100%;
      height: 100%;
      overflow: hidden;
    }

    body {
      margin: 0;
      padding: 16px;
      display: flex;
      justify-content: center;
      align-items: stretch;
      color: var(--ink);
      font-family: "IBM Plex Sans", "Segoe UI", "Helvetica Neue", sans-serif;
      background:
        radial-gradient(1000px 600px at -20% -10%, #fff6d6 0%, transparent 70%),
        radial-gradient(1000px 700px at 120% -30%, #d6f7ff 0%, transparent 70%),
        linear-gradient(135deg, var(--bg0), var(--bg1));
    }

    .layout {
      width: min(1200px, 100%);
      display: grid;
      grid-template-columns: 320px 1fr;
      gap: 16px;
      height: 100%;
      min-height: 0;
      align-items: stretch;
      overflow: hidden;
    }

    .layout > * {
      min-height: 0;
    }

    .panel {
      height: 100%;
      border: 1px solid var(--border);
      border-radius: 16px;
      background: var(--panel);
      backdrop-filter: blur(8px);
      box-shadow: 0 10px 30px rgba(18, 40, 59, 0.08);
      min-height: 0;
      overflow: hidden;
    }

    .settings {
      padding: 16px;
      display: flex;
      flex-direction: column;
      gap: 10px;
      max-height: 100%;
      overflow-y: auto;
      position: sticky;
      top: 0;
    }

    .title {
      margin: 0 0 6px;
      font-size: 20px;
      font-weight: 700;
      letter-spacing: 0.2px;
    }

    .sub {
      margin: 0 0 10px;
      font-size: 13px;
      color: var(--muted);
    }

    .field {
      display: flex;
      flex-direction: column;
      gap: 4px;
    }

    label {
      font-size: 12px;
      color: var(--muted);
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.6px;
    }

    input, textarea, select {
      width: 100%;
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 8px 10px;
      font-size: 14px;
      background: #fff;
      color: var(--ink);
      outline: none;
    }

    textarea {
      resize: vertical;
      min-height: 70px;
    }

    input:focus, textarea:focus, select:focus {
      border-color: var(--accent);
      box-shadow: 0 0 0 2px rgba(12, 122, 115, 0.15);
    }

    .row {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 8px;
    }

    .flag {
      display: flex;
      align-items: center;
      gap: 8px;
      font-size: 14px;
      color: var(--muted);
    }

    .flag input {
      width: auto;
      margin: 0;
    }

    .chat {
      display: flex;
      flex-direction: column;
      height: 100%;
      min-height: 0;
      overflow: hidden;
      position: relative;
      min-width: 0;
    }

    .chat-head {
      border-bottom: 1px solid var(--border);
      padding: 16px 18px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 12px;
      background: linear-gradient(180deg, rgba(255, 255, 255, 0.82), rgba(255, 255, 255, 0.62));
    }

    .chat-head strong {
      display: block;
      font-size: 16px;
      letter-spacing: 0.2px;
    }

    .chat-head small {
      display: block;
      margin-top: 2px;
      font-size: 12px;
      color: var(--muted);
    }

    .status {
      font-size: 12px;
      color: var(--muted);
      white-space: nowrap;
      padding: 6px 10px;
      border: 1px solid var(--border);
      border-radius: 999px;
      background: rgba(255, 255, 255, 0.92);
    }

    .chat-body {
      flex: 1 1 auto;
      min-height: 0;
      padding: 18px;
      overflow-y: auto;
      display: flex;
      flex-direction: column;
      gap: 12px;
      overscroll-behavior: contain;
      padding-bottom: 12px;
      background:
        linear-gradient(180deg, rgba(255, 255, 255, 0.18), rgba(255, 255, 255, 0.05)),
        radial-gradient(600px 320px at 0% 0%, rgba(255, 255, 255, 0.26), transparent 80%);
    }

    .bubble {
      max-width: 86%;
      padding: 12px 14px;
      border-radius: 14px;
      border: 1px solid var(--border);
      line-height: 1.45;
      white-space: pre-wrap;
      word-wrap: break-word;
      animation: pop-in 120ms ease-out;
      box-shadow: 0 10px 20px rgba(21, 37, 53, 0.06);
    }

    .bubble.user {
      align-self: flex-end;
      background: var(--user);
      border-color: #b4e7df;
    }

    .bubble.assistant {
      align-self: flex-start;
      background: var(--assistant);
    }

    .chat-foot {
      border-top: 1px solid var(--border);
      padding: 12px;
      display: grid;
      gap: 8px;
      background: linear-gradient(180deg, rgba(255, 255, 255, 0.7), rgba(255, 255, 255, 0.9));
      backdrop-filter: blur(10px);
      flex: 0 0 auto;
    }

    .composer {
      display: grid;
      grid-template-columns: 1fr auto;
      gap: 8px;
      align-items: stretch;
    }

    #userInput {
      min-height: 72px;
      max-height: 180px;
    }

    .btns {
      display: flex;
      gap: 8px;
      flex-direction: column;
      justify-content: stretch;
    }

    button {
      border: 1px solid transparent;
      border-radius: 10px;
      padding: 9px 12px;
      font-weight: 600;
      cursor: pointer;
      transition: transform 120ms ease, box-shadow 120ms ease;
      min-width: 112px;
    }

    button:hover {
      transform: translateY(-1px);
    }

    .primary {
      background: var(--accent);
      color: #fff;
      box-shadow: 0 6px 16px rgba(12, 122, 115, 0.25);
    }

    .warn {
      background: var(--accent-2);
      color: #fff;
      box-shadow: 0 6px 16px rgba(242, 106, 75, 0.24);
    }

    .ghost {
      background: #fff;
      border-color: var(--border);
      color: var(--ink);
    }

    .danger {
      background: #fff;
      border-color: #e9bdbd;
      color: var(--danger);
    }

    .hint {
      color: var(--muted);
      font-size: 12px;
      margin: 0;
    }

    .empty-state {
      padding: 18px;
      border: 1px dashed rgba(29, 42, 53, 0.2);
      border-radius: 16px;
      background: rgba(255, 255, 255, 0.5);
      color: var(--muted);
      line-height: 1.5;
    }

    @keyframes pop-in {
      from { opacity: 0; transform: translateY(3px); }
      to { opacity: 1; transform: translateY(0); }
    }

    @media (max-width: 980px) {
      body {
        display: block;
        padding: 8px;
        overflow: auto;
      }

      .layout {
        grid-template-columns: 1fr;
        width: 100%;
        height: auto;
        min-height: auto;
        overflow: visible;
      }

      .settings {
        position: static;
        max-height: none;
        overflow: visible;
      }

      .chat {
        height: 78dvh;
      }

      .bubble {
        max-width: 94%;
      }

      .composer {
        grid-template-columns: 1fr;
      }

      .btns {
        flex-direction: row;
        justify-content: flex-end;
        flex-wrap: wrap;
      }
    }
  </style>
</head>
<body>
  <div class="layout">
    <aside class="panel settings">
      <h1 class="title">wGInfer Chat</h1>
      <p class="sub">Project 3 Web UI, OpenAI-style backend</p>

      <div class="field">
        <label for="modelName">Model Name</label>
        <input id="modelName" value="wginfer-qwen2">
      </div>

      <div class="field">
        <label for="systemPrompt">System Prompt</label>
        <textarea id="systemPrompt" placeholder="You are a helpful assistant."></textarea>
      </div>

      <div class="row">
        <div class="field">
          <label for="maxTokens">Max Tokens</label>
          <input id="maxTokens" type="number" min="1" value="256">
        </div>
        <div class="field">
          <label for="topK">Top-K</label>
          <input id="topK" type="number" min="1" value="1">
        </div>
      </div>

      <div class="row">
        <div class="field">
          <label for="topP">Top-P</label>
          <input id="topP" type="number" min="0" max="1" step="0.01" value="1.0">
        </div>
        <div class="field">
          <label for="temperature">Temperature</label>
          <input id="temperature" type="number" min="0" step="0.1" value="1.0">
        </div>
      </div>

      <label class="flag">
        <input id="stream" type="checkbox" checked>
        Stream response
      </label>

      <button id="resetBtn" class="danger">Reset Conversation</button>
      <p class="hint">Enter to send, Shift+Enter for newline.</p>
    </aside>

    <main class="panel chat">
      <div class="chat-head">
        <div>
          <strong>Conversation</strong>
          <small>Streaming responses from the local wGInfer server</small>
        </div>
        <span class="status" id="status">Idle</span>
      </div>
      <div class="chat-body" id="chatBody">
        <div class="empty-state" id="emptyState">
          Messages will appear here. Keep the left panel for generation settings and use the bottom composer for chat.
        </div>
      </div>
      <div class="chat-foot">
        <div class="composer">
          <textarea id="userInput" placeholder="Type your message..."></textarea>
          <div class="btns">
            <button id="stopBtn" class="warn" disabled>Stop</button>
            <button id="sendBtn" class="primary">Send</button>
          </div>
        </div>
      </div>
    </main>
  </div>

  <script>
    const chatBody = document.getElementById("chatBody");
    const userInput = document.getElementById("userInput");
    const sendBtn = document.getElementById("sendBtn");
    const stopBtn = document.getElementById("stopBtn");
    const resetBtn = document.getElementById("resetBtn");
    const statusEl = document.getElementById("status");
    const modelNameEl = document.getElementById("modelName");
    const systemPromptEl = document.getElementById("systemPrompt");
    const maxTokensEl = document.getElementById("maxTokens");
    const topKEl = document.getElementById("topK");
    const topPEl = document.getElementById("topP");
    const temperatureEl = document.getElementById("temperature");
    const streamEl = document.getElementById("stream");

    const endpoint = "/v1/chat/completions";
    const history = [];
    let currentAbort = null;

    function autoResizeInput() {
      userInput.style.height = "auto";
      userInput.style.height = `${Math.min(userInput.scrollHeight, 180)}px`;
    }

    function setBusy(isBusy, text = "") {
      sendBtn.disabled = isBusy;
      stopBtn.disabled = !isBusy;
      statusEl.textContent = text || (isBusy ? "Generating..." : "Idle");
    }

    function scrollToBottom() {
      chatBody.scrollTop = chatBody.scrollHeight;
    }

    function createBubble(role, content) {
      const emptyState = document.getElementById("emptyState");
      if (emptyState) {
        emptyState.remove();
      }
      const el = document.createElement("div");
      el.className = `bubble ${role}`;
      el.textContent = content || "";
      chatBody.appendChild(el);
      scrollToBottom();
      return el;
    }

    function collectMessages(nextUserText) {
      const messages = [];
      const systemPrompt = systemPromptEl.value.trim();
      if (systemPrompt) {
        messages.push({ role: "system", content: systemPrompt });
      }
      for (const m of history) {
        messages.push({ role: m.role, content: m.content });
      }
      messages.push({ role: "user", content: nextUserText });
      return messages;
    }

    function buildPayload(nextUserText) {
      return {
        model: modelNameEl.value.trim() || "wginfer-qwen2",
        messages: collectMessages(nextUserText),
        max_tokens: Math.max(1, parseInt(maxTokensEl.value || "256", 10)),
        top_k: Math.max(1, parseInt(topKEl.value || "1", 10)),
        top_p: Number(topPEl.value || "1.0"),
        temperature: Number(temperatureEl.value || "1.0"),
        stream: !!streamEl.checked
      };
    }

    async function generateOnce(payload) {
      const resp = await fetch(endpoint, {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify(payload)
      });
      if (!resp.ok) {
        const text = await resp.text();
        throw new Error(`HTTP ${resp.status}: ${text}`);
      }
      return await resp.json();
    }

    async function generateStream(payload, onDelta) {
      currentAbort = new AbortController();
      const resp = await fetch(endpoint, {
        method: "POST",
        headers: { "Content-Type": "application/json", "Accept": "text/event-stream" },
        body: JSON.stringify(payload),
        signal: currentAbort.signal
      });
      if (!resp.ok || !resp.body) {
        const text = await resp.text();
        throw new Error(`HTTP ${resp.status}: ${text}`);
      }

      const reader = resp.body.getReader();
      const decoder = new TextDecoder("utf-8");
      let buf = "";

      while (true) {
        const { value, done } = await reader.read();
        if (done) break;
        buf += decoder.decode(value, { stream: true });
        const events = buf.split("\n\n");
        buf = events.pop() || "";

        for (const e of events) {
          const lines = e.split("\n");
          for (const line of lines) {
            if (!line.startsWith("data: ")) continue;
            const payloadText = line.slice(6).trim();
            if (!payloadText) continue;
            if (payloadText === "[DONE]") return;
            let obj = null;
            try {
              obj = JSON.parse(payloadText);
            } catch (_) {
              continue;
            }
            const choices = obj.choices || [];
            if (!choices.length) continue;
            const delta = choices[0].delta || {};
            if (typeof delta.content === "string" && delta.content.length > 0) {
              onDelta(delta.content);
            }
          }
        }
      }
    }

    async function onSend() {
      const text = userInput.value.trim();
      if (!text) return;
      userInput.value = "";
      autoResizeInput();

      history.push({ role: "user", content: text });
      createBubble("user", text);
      const assistantBubble = createBubble("assistant", "");

      const payload = buildPayload(text);
      setBusy(true, "Generating...");

      try {
        if (payload.stream) {
          let full = "";
          await generateStream(payload, (delta) => {
            full += delta;
            assistantBubble.textContent = full;
            scrollToBottom();
          });
          history.push({ role: "assistant", content: assistantBubble.textContent });
        } else {
          const obj = await generateOnce(payload);
          const content = obj?.choices?.[0]?.message?.content || "";
          assistantBubble.textContent = content;
          history.push({ role: "assistant", content });
        }
        setBusy(false, "Done");
      } catch (err) {
        const msg = (err && err.message) ? err.message : String(err);
        assistantBubble.textContent = `[Error] ${msg}`;
        history.push({ role: "assistant", content: assistantBubble.textContent });
        setBusy(false, "Error");
      } finally {
        currentAbort = null;
      }
    }

    function onStop() {
      if (currentAbort) {
        currentAbort.abort();
        currentAbort = null;
        setBusy(false, "Stopped");
      }
    }

    function onReset() {
      history.length = 0;
      chatBody.innerHTML = '<div class="empty-state" id="emptyState">Messages will appear here. Keep the left panel for generation settings and use the bottom composer for chat.</div>';
      userInput.value = "";
      autoResizeInput();
      setBusy(false, "Idle");
    }

    sendBtn.addEventListener("click", onSend);
    stopBtn.addEventListener("click", onStop);
    resetBtn.addEventListener("click", onReset);
    userInput.addEventListener("input", autoResizeInput);
    userInput.addEventListener("keydown", (e) => {
      if (e.key === "Enter" && !e.shiftKey) {
        e.preventDefault();
        onSend();
      }
    });
    autoResizeInput();
  </script>
</body>
</html>
